name: Flutter Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: AstraLink/astralink_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: astralink-windows-release
          path: AstraLink/astralink_app/build/windows/x64/runner/Release

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AstraLink/astralink_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: astralink-android-apk
          path: AstraLink/astralink_app/build/app/outputs/flutter-apk/app-release.apk
